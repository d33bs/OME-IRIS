[build-system]
build-backend = "setuptools.build_meta"
requires = [ "setuptools>=64" ]

[project]
name = "ome-iris"
version = "0.1.0"
description = "A tiny open bioimage dataset catalog with fetch and verify workflows."
readme = "README.md"
authors = [ { name = "Dave Bunten" } ]
requires-python = ">=3.11"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]
dependencies = [
  "pandas>=2.2.3",
  "pillow>=10",
  "pyyaml>=6",
]

scripts.ome-iris = "OME_IRIS.cli:main"

[dependency-groups]
dev = [
  "pre-commit>=4.2",
  "pytest>=8.3.5",
  "ruff>=0.11",
]
docs = [
  "myst-nb>=1.3",
  "pydata-sphinx-theme>=0.16.1",
  "sphinx>=8.2.3",
]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = [ "src" ]
include = [ "OME_IRIS*" ]

[tool.setuptools.package-data]
OME_IRIS = [
  "data/*.yaml",
  "data/*.csv",
  "data/datasets/*.yaml",
]

[tool.pytest.ini_options]
pythonpath = [ "src" ]
addopts = [ "-q" ]
